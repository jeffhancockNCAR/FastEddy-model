# This is a basic workflow to help you get started with Actions

name: CIT on derecho

# Controls when the workflow will run
on:
  # Triggers the workflow on pull request events but only for the "feature_CIT" branch
  pull_request_target:
    types: [labeled]
    branches: 
      - feature_CIT 
    paths-ignore:
      #- 'docs/**'
      - '.github/pull_request_template.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '**/README.md'
      - '**/LICENSE.md'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build_and_test"
  build_and_test:
    # Only do the actions when merged or manually run
    if: github.event.label.name == 'run-pr-tests' || github.event_name == 'workflow_dispatch'
    # The type of runner that the job will run on
    #runs-on: ubuntu-latest
    runs-on: shr-derecho

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it  v2 or v4? (Julie's example shows v2)
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Compile the FastEddy code
      - name: Compile FastEddy
        run: |
          cd SRC/FEMAIN
          module load cuda
          make clean
          make

      # Run FastEddy
      - name: Submit job of Example 2
        run: |
          cd /glade/work/fasteddyrt/actions-runner/_work/FastEddy-model/Example02_CBL
          qsub -Wblock=true fasteddy_pbs_script_derecho_10steps.sh
          ls -l output_10steps

      # Run pytest on the results of the FastEddy run
      - name: Run pytest
        run: |
          # This dir will change once these tests are in the repository
          cd /glade/work/fasteddyrt/actions-runner/_work/FastEddy-model/tests
          source /glade/work/ishitas/python_envs/py_derecho/bin/activate
          pytest --output-dir=/glade/work/fasteddyrt/actions-runner/_work/FastEddy-model/Example02_CBL/output_10steps
      
      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Append datetime to a file
          /glade/work/fasteddyrt/actions-runner/appendDatetimeRun.sh
          
