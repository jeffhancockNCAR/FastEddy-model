timesteps: 10
outputfreq: 2
batchsteps: 2

test_cases:
  - Example01_NBL:
      # Total number of time steps for the FastEddy run (required)
      timesteps: 10
      
      # frequency (in timesteps) at which to produce output (required)
      outputfreq: 2
      
      # Number of timesteps to compute in batch launch, must have batchsteps <= timesteps (defaults to outputfreq)
      batchsteps: 2
      
      # Reference directory containing truth data for the run.  Can be relative to repo_root or absolute (start with '/') (required)
      pytest_ref_dir: "/glade/work/fasteddyrt/actions-runner/_work/FastEddy-model/Example01_NBL/reference_10steps"
      
      # Name of pytest report for the test case.  Defaults to test label (ie Example01_NBL) + "_report.html" ?
      pytest_report_name: "Example01_NBL_report.html"
      
  - Example02_CBL:
      outputfreq: 5
      batchsteps: 5
      pytest_ref_dir: "/glade/work/fasteddyrt/actions-runner/_work/FastEddy-model/Example02_CBL/reference_10steps"
      pytest_report_name: "Example02_CBL_report.html"
      
  - Example03_SBL:
      pytest_ref_dir: "/glade/work/fasteddyrt/actions-runner/_work/FastEddy-model/Example03_SBL/reference_10steps"
      pytest_report_name: "Example03_SBL_report.html"
      
  - Example04_BOMEX:
      pytest_ref_dir: "/glade/work/fasteddyrt/actions-runner/_work/FastEddy-model/Example04_BOMEX/reference_10steps"
      pytest_report_name: "Example04_BOMEX_report.html"
      mpi_ranks: 1
      select: "1:ncpus=1:mpiprocs=1:ngpus=1:mem=100GB"
      
  - Example05_CANOPY:
      pytest_ref_dir: "/glade/work/fasteddyrt/actions-runner/_work/FastEddy-model/Example05_CANOPY/reference_10steps"
      pytest_report_name: "Example05_CANOPY_report.html"
      
  - Example06_OFFSHORE:
      pytest_ref_dir: "/glade/work/fasteddyrt/actions-runner/_work/FastEddy-model/Example06_OFFSHORE/reference_10steps"
      pytest_report_name: "Example06_OFFSHORE_report.html"
      
  - Example07_DISPERSION_CBL:
      pytest_ref_dir: "/glade/work/fasteddyrt/actions-runner/_work/FastEddy-model/Example07_DISPERSION_CBL/reference_10steps"
      pytest_report_name: "Example07_DISPERSION_CBL_report.html"
      pytest_do_not_run: ["test_netcdf_structure.py", "test_netcdf_values.py", "test_visualization.py"]
      
  - Example07_DISPERSION_SBL:
      pytest_ref_dir: "/glade/work/fasteddyrt/actions-runner/_work/FastEddy-model/Example07_DISPERSION_SBL/reference_10steps"
      pytest_report_name: "Example07_DISPERSION_SBL_report.html"
      
      